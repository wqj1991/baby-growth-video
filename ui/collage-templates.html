<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>拼图模板系统 — 设计原型</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --amber:#f58b3d;--coral:#d44d68;--indigo:#3b3d6a;--gold:#e8a840;
  --jade:#4a9e8c;--rose:#c7516f;
  --surface:#fafaf8;--raised:#fff;--glass:rgba(255,255,255,0.78);
  --border:#e8e6de;--text-p:#2a2726;--text-s:#6e6a62;--text-t:#b0aca0;
  --radius:1rem;--radius-lg:1.25rem;--radius-xl:1.5rem;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.04);--shadow-md:0 4px 20px rgba(0,0,0,0.06);
  --shadow-lg:0 10px 35px rgba(0,0,0,0.08);
  --trans:200ms cubic-bezier(0.4,0,0.2,1);
}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:linear-gradient(135deg,#fef7f0 0%,#fdf2f2 30%,#f8f6fc 60%,#fef7f0 100%);
  background-attachment:fixed;
  color:var(--text-p);min-height:100dvh;line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
/* Decorative bg */
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 20%, rgba(245,139,61,0.08) 0%, transparent 50%),
    radial-gradient(ellipse 60% 70% at 80% 70%, rgba(212,77,104,0.06) 0%, transparent 50%),
    radial-gradient(ellipse 50% 50% at 50% 50%, rgba(232,168,64,0.04) 0%, transparent 50%);
  pointer-events:none;z-index:0;
}

/* Layout */
.app{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:2rem 1.5rem;}
.header{text-align:center;margin-bottom:2.5rem;}
.header h1{
  font-size:2rem;font-weight:800;letter-spacing:-0.025em;
  background:linear-gradient(135deg,var(--amber),var(--coral));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:0.25rem;
}
.header p{font-size:0.925rem;color:var(--text-s);}

/* Count pills */
.count-pills{
  display:flex;gap:0.5rem;flex-wrap:wrap;justify-content:center;
  margin-bottom:2.5rem;padding:0.5rem;
  background:var(--glass);backdrop-filter:blur(20px);
  border-radius:var(--radius-xl);border:1px solid var(--border);
  box-shadow:var(--shadow-sm);max-width:fit-content;
  margin-left:auto;margin-right:auto;
}
.pill{
  width:3rem;height:3rem;border-radius:50%;
  border:1.5px solid transparent;background:#fff;
  font-size:0.925rem;font-weight:600;color:var(--text-s);
  cursor:pointer;transition:all var(--trans);
  display:flex;align-items:center;justify-content:center;
  position:relative;
}
.pill:hover{
  border-color:var(--amber);color:var(--amber);
  transform:translateY(-2px);box-shadow:0 4px 12px rgba(245,139,61,0.15);
}
.pill.active{
  background:linear-gradient(135deg,var(--amber),var(--coral));
  color:#fff;border-color:transparent;
  box-shadow:0 4px 16px rgba(212,77,104,0.3);transform:scale(1.08);
}
.pill .badge{
  position:absolute;top:-4px;right:-4px;background:var(--rose);
  color:#fff;font-size:0.625rem;font-weight:700;border-radius:50%;
  min-width:1.15rem;height:1.15rem;display:flex;align-items:center;justify-content:center;
  border:2px solid #fff;
}

/* Section title */
.section-title{font-size:0.8rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-t);margin-bottom:1rem;}

/* Template grid */
.template-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:1rem;margin-bottom:2.5rem;
}

.template-card{
  background:var(--raised);border-radius:var(--radius-lg);
  border:2px solid var(--border);overflow:hidden;
  cursor:pointer;transition:all var(--trans);
  box-shadow:var(--shadow-sm);
}
.template-card:hover{
  border-color:var(--amber);transform:translateY(-4px);
  box-shadow:var(--shadow-lg);
}
.template-card.selected{
  border-color:var(--coral);box-shadow:0 0 0 3px rgba(212,77,104,0.15),var(--shadow-md);
  background:linear-gradient(135deg,#fef7f0,#fdf2f2);
}
.template-card .preview-area{
  aspect-ratio:1;position:relative;background:#f8f6f2;
  border-bottom:1px solid var(--border);
}
.template-card .card-body{padding:0.625rem 0.75rem;}
.template-card .card-body .tpl-name{font-size:0.8rem;font-weight:600;color:var(--text-p);margin-bottom:0.125rem;}
.template-card .card-body .tpl-desc{font-size:0.675rem;color:var(--text-t);}
.template-card .card-body .tpl-id{font-size:0.625rem;color:var(--text-t);margin-top:0.25rem;font-family:monospace;}

/* Preview region blocks */
.region-block{
  position:absolute;border:1px solid rgba(0,0,0,0.06);
  transition:transform 150ms ease;
}
.template-card:hover .region-block{transform:scale(0.97);}

/* Palette for photo placeholders */
.r-0{background:linear-gradient(135deg,#ffe4c8,#ffd0a8)}   .r-0::after{content:'1'}
.r-1{background:linear-gradient(135deg,#fdd8df,#fbc1cd)}   .r-1::after{content:'2'}
.r-2{background:linear-gradient(135deg,#d5e8f5,#bdd8ef)}   .r-2::after{content:'3'}
.r-3{background:linear-gradient(135deg,#d4ede5,#b8e3d4)}   .r-3::after{content:'4'}
.r-4{background:linear-gradient(135deg,#fef2d0,#fde8a0)}   .r-4::after{content:'5'}
.r-5{background:linear-gradient(135deg,#f0dde8,#e4c5d5)}   .r-5::after{content:'6'}
.r-6{background:linear-gradient(135deg,#dae8f2,#c4d8e8)}   .r-6::after{content:'7'}
.r-7{background:linear-gradient(135deg,#e8e2d0,#dad0b8)}   .r-7::after{content:'8'}
.r-8{background:linear-gradient(135deg,#f8e0e6,#f2c8d2)}   .r-8::after{content:'9'}
.region-block::after{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:0.7rem;font-weight:700;color:rgba(0,0,0,0.18);
  font-family:'Inter',monospace;
}

/* Detail panel */
.detail-panel{
  display:grid;grid-template-columns:1fr 350px;gap:1.5rem;margin-top:2rem;
}
@media(max-width:900px){.detail-panel{grid-template-columns:1fr}}

.detail-preview{
  aspect-ratio:1;max-width:500px;position:relative;
  background:#fff;border-radius:var(--radius-xl);
  border:2px solid var(--border);box-shadow:var(--shadow-lg);
  overflow:hidden;margin:0 auto;width:100%;
}
.detail-preview .region-block{border-width:2px;}
.detail-preview .region-block::after{font-size:1rem;}

.detail-info{
  background:var(--glass);backdrop-filter:blur(20px);
  border-radius:var(--radius-xl);border:1px solid var(--border);
  padding:1.5rem;box-shadow:var(--shadow-md);
}
.detail-info h3{font-size:1.1rem;font-weight:700;margin-bottom:0.25rem;}
.detail-info .desc{color:var(--text-s);font-size:0.85rem;margin-bottom:1.25rem;}
.detail-info .meta{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1rem;}
.detail-info .meta-tag{
  font-size:0.7rem;font-weight:600;padding:0.25rem 0.625rem;
  border-radius:99px;background:linear-gradient(135deg,var(--amber),var(--coral));
  color:#fff;letter-spacing:0.02em;
}

/* Region list */
.region-list{margin-top:1.25rem;}
.region-list h4{font-size:0.75rem;font-weight:700;color:var(--text-t);margin-bottom:0.5rem;text-transform:uppercase;letter-spacing:0.05em;}
.region-item{
  display:flex;align-items:center;gap:0.5rem;padding:0.4rem 0.5rem;
  border-radius:0.5rem;font-size:0.8rem;border:1px solid var(--border);
  margin-bottom:0.35rem;background:#fff;transition:all var(--trans);
}
.region-item:hover{background:linear-gradient(135deg,#fef7f0,#fdf2f2);}
.region-item .idx{
  width:1.5rem;height:1.5rem;border-radius:0.375rem;display:flex;
  align-items:center;justify-content:center;font-size:0.65rem;font-weight:700;
  color:#fff;flex-shrink:0;
}
.region-item .coords{color:var(--text-t);font-family:monospace;font-size:0.7rem;margin-left:auto;}

/* Arrow hint */
.arrow-hint{
  text-align:center;padding:1rem;color:var(--text-t);
  font-size:0.8rem;display:flex;align-items:center;justify-content:center;gap:0.5rem;
}
.arrow-hint svg{animation:bounce 1.5s infinite;}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(5px)}}

/* Empty state */
.empty-state{
  text-align:center;padding:3rem 1rem;color:var(--text-t);
  grid-column:1/-1;
}
.empty-state svg{margin-bottom:0.75rem;opacity:0.4;}
.empty-state p{font-size:0.85rem;}

/* Responsive */
@media(max-width:640px){
  .app{padding:1rem 0.75rem}
  .header h1{font-size:1.5rem}
  .template-grid{grid-template-columns:repeat(2,1fr);gap:0.5rem}
  .pill{width:2.4rem;height:2.4rem;font-size:0.8rem}
}

/* Scrollbar */
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>
<div class="app">

    <h1>拼图模板系统 · Template Gallery</h1>
    <p>选择照片数量，浏览对应模板 — 仿美图秀秀体验</p>
  </header>

  <nav class="count-pills" id="countPills"></nav>

  <div class="arrow-hint" id="arrowHint">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--amber)" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
    选择一个数量类别查看模板
  </div>

  <div id="templateGrid" class="template-grid"></div>

  <div class="detail-panel" id="detailPanel" style="display:none">
    <div class="detail-preview" id="detailPreview"></div>
    <div class="detail-info" id="detailInfo"></div>
  </div>
</div>

  'linear-gradient(135deg,#fef0e0,#ffe4c8)',
  'linear-gradient(135deg,#fde8ee,#fbc1cd)',
  'linear-gradient(135deg,#e6f0fa,#c5d9f0)',
  'linear-gradient(135deg,#e2f0eb,#c0e0d5)',
  'linear-gradient(135deg,#fef8e8,#fce8c0)',
  'linear-gradient(135deg,#f4e8f0,#e8c8e0)',
  'linear-gradient(135deg,#e8f0f8,#d0e0f0)',

  'linear-gradient(135deg,#fce8ee,#f4c8d4)',
];

// ─── STATE ──────────────────────────────────────────────────
let currentCount = 3;
let selectedTemplate = TEMPLATES[3]?.[0] || null;

// ─── RENDER COUNT PILLS ─────────────────────────────────────
function renderPills(){
  const container = document.getElementById('countPills');
  container.innerHTML = '';
  for(let n=2; n<=9; n++){
    const btn = document.createElement('button');
    btn.className = 'pill' + (n===currentCount?' active':'');
    btn.textContent = n;
    if(n===3 || n===4 || n===6 || n===9){
      const badge = document.createElement('span');
      badge.className = 'badge';
      badge.textContent = n>=6?'★':'';
      btn.appendChild(badge);
    }
    btn.addEventListener('click',()=>{
      currentCount=n;
      selectedTemplate = TEMPLATES[currentCount]?.[0] || null;
      renderAll();
      document.getElementById('templateGrid').scrollIntoView({behavior:'smooth',block:'center'});
    });
    container.appendChild(btn);
  }
}

// ─── BUILD PREVIEW ELEMENT ──────────────────────────────────
function buildPreview(regions, containerEl){
  regions.forEach((r,i) => {
    const div = document.createElement('div');
    div.className = 'region-block r-'+i;
    div.style.left = (r.x*100)+'%';
    div.style.top = (r.y*100)+'%';
    div.style.width = (r.w*100)+'%';
    div.style.height = (r.h*100)+'%';
    containerEl.appendChild(div);
  });
}

// ─── RENDER TEMPLATE CARDS ──────────────────────────────────
function renderCards(){
  const grid = document.getElementById('templateGrid');
  const arrowHint = document.getElementById('arrowHint');
  grid.innerHTML = '';
  const templates = TEMPLATES[currentCount] || [];

  if(templates.length===0){
    grid.innerHTML = '<div class="empty-state"><p>暂无该数量的模板</p></div>';
    arrowHint.style.display='flex';
    return;
  }

  arrowHint.style.display='none';

  templates.forEach(tpl => {
    const card = document.createElement('div');
    card.className = 'template-card' + (selectedTemplate && selectedTemplate.id===tpl.id?' selected':'');
    card.addEventListener('click',()=>{ selectedTemplate=tpl; renderAll(); });

    const preview = document.createElement('div');
    preview.className = 'preview-area';
    buildPreview(tpl.regions, preview);
    card.appendChild(preview);

    const body = document.createElement('div');
    body.className = 'card-body';
    body.innerHTML = `
      <div class="tpl-name">${tpl.name}</div>
      <div class="tpl-desc">${tpl.desc}</div>
    `;
    card.appendChild(body);
    grid.appendChild(card);
  });
}

// ─── RENDER DETAIL PANEL ────────────────────────────────────
function renderDetail(){
  const panel = document.getElementById('detailPanel');
  const preview = document.getElementById('detailPreview');
  const info = document.getElementById('detailInfo');

  if(!selectedTemplate){
    panel.style.display='none';
    return;
  }

  panel.style.display='grid';
  preview.innerHTML = '';
  buildPreview(selectedTemplate.regions, preview);

  const tpl = selectedTemplate;
  info.innerHTML = `
    <h3>${tpl.name}</h3>
    <p class="desc">${tpl.tips}</p>
    <div class="meta">
      <span class="meta-tag">${currentCount} 张照片</span>
    </div>
    <p style="font-size:0.75rem;color:var(--text-t);margin-bottom:0.75rem;">Template ID: ${tpl.id}</p>
    <div class="region-list">
      <h4>布局区域定义</h4>
      ${tpl.regions.map((r,i) => `
        <div class="region-item">
          <div class="idx r-${i}"></div>
          <span>照片 #${i+1}</span>
          <span class="coords">x:${(r.x*100).toFixed(0)}% y:${(r.y*100).toFixed(0)}% w:${(r.w*100).toFixed(0)}% h:${(r.h*100).toFixed(0)}%</span>
        </div>
      `).join('')}
    </div>
  `;
}

// ─── MAIN RENDER ────────────────────────────────────────────
function renderAll(){
  renderPills();
  renderCards();
  renderDetail();
}

// ─── INIT ───────────────────────────────────────────────────
renderAll();
</script>
